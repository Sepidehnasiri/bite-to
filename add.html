<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add a Spot — BiteTo</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ================= NAVBAR ================= -->
    <header>
        <nav class="navbar">
            <div class="logo">Bite<span>To</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="explore.html">Explore</a></li>
                <li><a href="add.html" class="active">Add a Spot</a></li>
            </ul>
            <a href="add.html" class="btn-primary">+ Add a Spot</a>
        </nav>
    </header>

    <!-- ================= MAIN CONTENT ================= -->
    <main>
        <section class="container">
            <h1>Add a New Spot</h1>
            <p>Share your favorite Toronto food spot with the community!</p>

            <form id="add-spot-form" class="add-spot-form">
                <div class="form-group">
                    <label for="name">Spot Name *</label>
                    <input type="text" id="name" name="name" required>
                    <span class="error" id="name-error"></span>
                </div>

                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category" name="category" required>
                        <option value="">Select Category</option>
                        <option value="Café">Café</option>
                        <option value="Restaurant">Restaurant</option>
                        <option value="Dessert">Dessert</option>
                        <option value="Fast Food">Fast Food</option>
                        <option value="Bar">Bar</option>
                    </select>
                    <span class="error" id="category-error"></span>
                </div>

                <div class="form-group">
                    <label for="location">Location *</label>
                    <input type="text" id="location" name="location" required>
                    <span class="error" id="location-error"></span>
                </div>

                <div class="form-group">
                    <label for="emoji">Emoji</label>
                    <input type="text" id="emoji" name="emoji" placeholder="e.g. ☕">
                </div>

                <div class="form-group">
                    <label for="tag">Tag</label>
                    <input type="text" id="tag" name="tag" placeholder="e.g. Brunch fav">
                </div>

                <div class="form-group">
                    <label for="cuisine">Cuisine Type *</label>
                    <input type="text" id="cuisine" name="cuisine" required>
                    <span class="error" id="cuisine-error"></span>
                </div>

                <div class="form-group">
                    <label for="rating">Rating (1-5) *</label>
                    <input type="number" id="rating" name="rating" min="1" max="5" step="0.1" required>
                    <span class="error" id="rating-error"></span>
                </div>

                <div class="form-group">
                    <label for="reviews">Number of Reviews *</label>
                    <input type="number" id="reviews" name="reviews" min="0" required>
                    <span class="error" id="reviews-error"></span>
                </div>

                <div class="form-group">
                    <label for="address">Address *</label>
                    <input type="text" id="address" name="address" required>
                    <span class="error" id="address-error"></span>
                </div>

                <div class="form-group">
                    <label for="image">Image URL (optional)</label>
                    <input type="url" id="image" name="image" placeholder="https://example.com/image.jpg">
                    <span class="error" id="image-error"></span>
                </div>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="featured" name="featured">
                        Mark as Featured Spot
                    </label>
                </div>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="trending" name="trending" checked>
                        Add to Trending Spots
                    </label>
                </div>

                <button type="submit" class="btn-primary">Add Spot</button>
            </form>
        </section>
    </main>

    <!-- ================= FOOTER ================= -->
    <footer>
        <p>&copy; 2025 <strong>BiteTo</strong> — Toronto's Food Discovery App</p>
    </footer>

    <!-- Main JavaScript -->
    <script src="js/scripts.js"></script>
</body>
</html>
