<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add a Spot — BiteTo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"><span class="faded">BiteTo</span>Bite<span>To</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="explore.html">Explore</a></li>
                <li><a href="add.html" class="active">Add a Spot</a></li>
            </ul>
            <a href="add.html" class="btn-primary">+ Add a Spot</a>
        </nav>
    </header>

    <main>
        <section class="container">
            <h1>Add a New Spot</h1>
            <p>Share your favorite Toronto food spot with the community!</p>

            <form id="add-spot-form" class="add-spot-form">
                <div class="form-group">
                    <label for="name">Spot Name *</label>
                    <input type="text" id="name" name="name" minlength="4" required placeholder="e.g. Baker Street Bistro">
                    <span class="error" id="name-error"></span>
                </div>

                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" name="description" rows="3" required placeholder="Describe the spot in a few words"></textarea>
                    <span class="error" id="description-error"></span>
                </div>

                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category" name="category" required>
                        <option value="">Select Category</option>
                        <option value="Café">Café</option>
                        <option value="Restaurant">Restaurant</option>
                        <option value="Dessert">Dessert</option>
                        <option value="Fast Food">Fast Food</option>
                        <option value="Bar">Bar</option>
                    </select>
                    <span class="error" id="category-error"></span>
                </div>

                <div class="form-group">
                    <label for="location">Location *</label>
                    <input type="text" id="location" name="location" required>
                    <span class="error" id="location-error"></span>
                </div>

                <div class="form-group">
                    <label for="emoji">Emoji *</label>
                    <select id="emoji" name="emoji" required>
                        <option value="">Select Emoji</option>
                        <option value="☕">☕ Coffee</option>
                        <option value="🍽">🍽 Restaurant</option>
                        <option value="🍜">🍜 Noodles</option>
                        <option value="🧁">🧁 Dessert</option>
                        <option value="🦞">🦞 Seafood</option>
                        <option value="🥐">🥐 Pastry</option>
                        <option value="🍔">🍔 Burger</option>
                        <option value="🍣">🍣 Sushi</option>
                        <option value="🍷">🍷 Wine</option>
                        <option value="🍱">🍱 Bento</option>
                        <option value="🍦">🍦 Ice Cream</option>
                        <option value="🌮">🌮 Tacos</option>
                    </select>
                    <span class="error" id="emoji-error"></span>
                </div>

                <div class="form-group">
                    <label for="tag">Tag</label>
                    <input type="text" id="tag" name="tag" placeholder="e.g. Brunch fav">
                </div>

                <div class="form-group">
                    <label for="cuisine">Cuisine Type *</label>
                    <select id="cuisine" name="cuisine" required>
                        <option value="">Select Cuisine Type</option>
                        <option value="Thai">Thai</option>
                        <option value="French">French</option>
                        <option value="Canadian">Canadian</option>
                        <option value="Japanese">Japanese</option>
                        <option value="Spanish">Spanish</option>
                        <option value="Mexican">Mexican</option>
                        <option value="Italian">Italian</option>
                        <option value="Chinese">Chinese</option>
                        <option value="Indian">Indian</option>
                        <option value="Korean">Korean</option>
                        <option value="Vietnamese">Vietnamese</option>
                        <option value="Mediterranean">Mediterranean</option>
                        <option value="Middle Eastern">Middle Eastern</option>
                        <option value="American">American</option>
                        <option value="Brazilian">Brazilian</option>
                        <option value="Turkish">Turkish</option>
                        <option value="Portuguese">Portuguese</option>
                        <option value="Greek">Greek</option>
                        <option value="Lebanese">Lebanese</option>
                        <option value="Filipino">Filipino</option>
                    </select>
                    <span class="error" id="cuisine-error"></span>
                </div>

                <div class="form-group">
                    <label for="rating">Rating (1-5) *</label>
                    <input type="number" id="rating" name="rating" min="1" max="5" step="0.1" required>
                    <span class="error" id="rating-error"></span>
                </div>

                <div class="form-group">
                    <label for="address">Address *</label>
                    <input type="text" id="address" name="address" required>
                    <span class="error" id="address-error"></span>
                </div>

                <div class="form-group">
                    <label for="image">Upload Photo (optional)</label>
                    <input type="file" id="image" name="image" accept="image/*">
                    <span class="error" id="image-error"></span>
                </div>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="featured" name="featured">
                        Mark as Featured Spot
                    </label>
                </div>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="trending" name="trending" checked>
                        Add to Trending Spots
                    </label>
                </div>

                <button type="submit" class="btn-primary">Add Spot</button>
            </form>
        </section>
    </main>
    <footer>
        <div class="footer-top">
            <div>
                <p class="footer-brand">BiteTo helps you discover the best food spots in Toronto.</p>
            </div>
            <div class="footer-social">
                <a href="https://instagram.com/" target="_blank" rel="noopener">Instagram</a>
                <a href="https://linkedin.com/" target="_blank" rel="noopener">LinkedIn</a>
                <a href="https://github.com/" target="_blank" rel="noopener">GitHub</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>Contact us: <a href="mailto:hello@biteto.com">hello@biteto.com</a></p>
            <p class="footer-copy">&copy; 2025 <strong>BiteTo</strong></p>
        </div>
    </footer>

    <!-- Main JavaScript -->
    <script src="js/scripts.js"></script>
</body>
</html>
